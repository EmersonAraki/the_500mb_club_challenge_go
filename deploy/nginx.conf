# Load balancer for the 3 API instances. Strict round-robin (nginx default) is
# intentional: it exposes per-instance tail-latency variance (e.g. GC pauses)
# rather than hiding it behind adaptive balancing.
worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
}

http {
    access_log off;
    error_log /dev/stderr error;

    tcp_nodelay on;
    tcp_nopush  on;
    sendfile    off;

    # Discard data on abnormal/timed-out client closes instead of lingering.
    # Acceptable for a benchmark API: it keeps a slow client from pinning a
    # worker connection. Would need thought for a public API.
    reset_timedout_connection on;
    lingering_close           off;

    keepalive_timeout 30;
    keepalive_requests 100000;

    upstream api {
        server api1:8080;
        server api2:8080;
        server api3:8080;
        # Default keepalive_requests (1000) recycles upstream connections every
        # ~5s at sustained RPS, paying a TCP handshake each time for nothing.
        # Pin the pool large, long-lived, and high-request so it stays warm.
        keepalive 128;
        keepalive_requests 100000;
        keepalive_time 1h;
    }

    server {
        listen 8080;

        # /healthz is liveness for the LB entrypoint ("no storage access"), so
        # answer it locally: no upstream hop per probe. Per-instance liveness is
        # still observable via /readyz and direct probing. The contract smoke
        # test asserts the body contains "ok".
        location = /healthz {
            default_type text/plain;
            return 200 "ok";
        }

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            # Convert an API stall (long GC pause, Redis hiccup) into a fast
            # failure instead of holding the client for nginx's 60s default.
            # read timeout stays well above our slowest op (batch p99.9 ~23ms).
            proxy_connect_timeout 1s;
            proxy_send_timeout    5s;
            proxy_read_timeout    5s;
        }
    }
}
