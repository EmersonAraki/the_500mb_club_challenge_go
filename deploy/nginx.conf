# Load balancer for the 3 API instances. Strict round-robin (nginx default) is
# intentional: it exposes per-instance tail-latency variance (e.g. GC pauses)
# rather than hiding it behind adaptive balancing.
worker_processes 1;

events {
    worker_connections 4096;
}

http {
    access_log off;
    error_log /dev/stderr error;

    upstream api {
        server api1:8080;
        server api2:8080;
        server api3:8080;
        keepalive 64;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}
