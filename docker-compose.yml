# Pi-Bench telemetry stack: load balancer + 3 API instances + Redis.
#
# Resource limits sum within the inviolable aggregate ceiling of 2 CPU / 500 MB.
# The split favors capacity and was tuned empirically with a load sweep
# (stress/cmd/capacity, under a ÷4 Pi-approximation). Both shared funnels -- the
# single nginx and single Redis, through which all traffic passes -- get more than
# an even share; the 3 API instances parallelize and run leanest. At the knee
# (~3200 RPS, ~3x the ~1000 par) nginx and Redis sit co-equal (~47% of quota each),
# so the split is already balanced -- a finer rebalance between the two funnels was
# A/B-tested and made no measurable difference (within run-to-run noise), so this
# split is kept. Re-tune on the real Pi.
#   redis   0.40 CPU /  96 MB
#   nginx   0.48 CPU /  32 MB
#   api x3  0.37 CPU / 120 MB each  (1.11 CPU / 360 MB)
#   total   1.99 CPU / 488 MB
services:
  redis:
    image: redis:7-alpine
    # No persistence (RDB/AOF off); cap memory with an LRU safety net on top of
    # the per-device history cap enforced by the API.
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 80mb
      --maxmemory-policy allkeys-lru
    # Top-level cpus/mem_limit mirror the deploy block so the aggregate budget is
    # enforced by `docker compose up` on any Compose version (deploy.resources
    # was historically swarm-only). The validator reads the top-level form with
    # precedence over deploy.resources, so this does not double-count.
    cpus: "0.40"
    mem_limit: 96M
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 96M
    restart: unless-stopped

  api1:
    build: .
    hostname: api1
    environment: &api-env
      REDIS_ADDR: redis:6379
      DEVICE_CAP: "1024"
      GOMEMLIMIT: 110MiB
      # Pin to the ~0.45-core share: one P avoids the goroutine migration and
      # GC-assist jitter of an oversubscribed runtime under a sub-core quota.
      GOMAXPROCS: "1"
    depends_on: [redis]
    cpus: &api-cpus "0.37"
    mem_limit: &api-mem 120M
    deploy: &api-deploy
      resources:
        limits:
          cpus: "0.37"
          memory: 120M
    restart: unless-stopped

  api2:
    build: .
    hostname: api2
    environment: *api-env
    depends_on: [redis]
    cpus: *api-cpus
    mem_limit: *api-mem
    deploy: *api-deploy
    restart: unless-stopped

  api3:
    build: .
    hostname: api3
    environment: *api-env
    depends_on: [redis]
    cpus: *api-cpus
    mem_limit: *api-mem
    deploy: *api-deploy
    restart: unless-stopped

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on: [api1, api2, api3]
    cpus: "0.48"
    mem_limit: 32M
    deploy:
      resources:
        limits:
          cpus: "0.48"
          memory: 32M
    restart: unless-stopped
