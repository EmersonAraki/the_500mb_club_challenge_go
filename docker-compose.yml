# Pi-Bench telemetry stack (implementation branch): pulls the published image.
#
# Security-hardened: read-only rootfs, dropped capabilities, no-new-privileges,
# non-root APIs -- set explicitly so the compose is self-contained.
#
# Resource limits sum within the inviolable aggregate ceiling of 2 CPU / 500 MB.
# CPU favors the two shared funnels -- the single nginx and single Redis, which all
# traffic crosses and which are single-threaded -- over the 3 API instances, which
# parallelize and have the most headroom. Starving either funnel caps throughput
# for the whole stack, so the funnels get the larger share.
#   redis   0.40 CPU /  96 MB
#   nginx   0.48 CPU /  32 MB
#   api x3  0.37 CPU / 120 MB each  (1.11 CPU / 360 MB)
#   total   1.99 CPU / 488 MB

x-api: &api
  image: ghcr.io/emersonaraki/the_500mb_club_challenge_go:1.1.0
  environment:
    REDIS_ADDR: redis:6379
    DEVICE_CAP: "1024"
    GOMEMLIMIT: 110MiB
    # One P per instance: matches the sub-core quota and avoids the goroutine
    # migration and GC-assist jitter of an oversubscribed runtime.
    GOMAXPROCS: "1"
  user: "65534:65534"
  read_only: true
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp
  depends_on: [redis]
  # Top-level cpus/mem_limit mirror the deploy block so the aggregate budget is
  # enforced by `docker compose up` on any Compose version (deploy.resources was
  # historically swarm-only). The validator reads the top-level form with
  # precedence over deploy.resources, so this does not double-count.
  cpus: "0.37"
  mem_limit: 120M
  deploy:
    resources:
      limits:
        cpus: "0.37"
        memory: 120M
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    # Exec-form command (list) so it can never be read as shell form.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "80mb", "--maxmemory-policy", "allkeys-lru"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    cpus: "0.40"
    mem_limit: 96M
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 96M
    restart: unless-stopped

  api1:
    <<: *api
    hostname: api1

  api2:
    <<: *api
    hostname: api2

  api3:
    <<: *api
    hostname: api3

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "8080:8080"
    depends_on: [api1, api2, api3]
    cpus: "0.48"
    mem_limit: 32M
    deploy:
      resources:
        limits:
          cpus: "0.48"
          memory: 32M
    restart: unless-stopped
