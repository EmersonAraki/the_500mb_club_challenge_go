name: Build and Publish Docker Image

# Publishes a pullable arm64 image to GHCR on every push to main, so the Pi 5
# always has a ghcr.io/<owner>/<repo>:latest to pull -- no manual build/transfer.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false # no go.sum (zero third-party deps); skip the module cache
      # A red build never publishes.
      - run: go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # GHCR repository names must be lowercase; github.repository can contain
      # uppercase (e.g. EmersonAraki/...), so fold it to lowercase for the tag.
      - name: Compute lowercase image name
        run: echo "IMAGE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The Dockerfile cross-compiles arm64 natively, so no QEMU step is needed:
      # only the final scratch layer is platform-tagged.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
