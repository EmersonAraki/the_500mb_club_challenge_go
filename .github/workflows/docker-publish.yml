name: Build and Publish Docker Image

# Publishes a pullable arm64 image to GHCR. A push to main refreshes :latest; a
# version tag (vX.Y.Z) also publishes an immutable :X.Y.Z that the benchmark's
# implementation branch pins, so organizers always run a reproducible image.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false # no go.sum (zero third-party deps); skip the module cache
      # A red build never publishes.
      - run: go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # GHCR repository names must be lowercase. On a vX.Y.Z tag push, publish the
      # immutable :X.Y.Z plus :latest; on a main push, refresh only :latest.
      - name: Compute image tags
        run: |
          IMG="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            echo "TAGS=${IMG}:${GITHUB_REF_NAME#v},${IMG}:latest" >> "$GITHUB_ENV"
          else
            echo "TAGS=${IMG}:latest" >> "$GITHUB_ENV"
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The Dockerfile cross-compiles arm64 natively, so no QEMU step is needed:
      # only the final scratch layer is platform-tagged.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.TAGS }}
